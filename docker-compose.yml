services:
  postgres:
    image: postgres:15
    container_name: realworld-postgres
    environment:
      POSTGRES_DB: realworld
      POSTGRES_USER: realworld
      POSTGRES_PASSWORD: realworld
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realworld -d realworld"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./spring-boot-realworld-example-app
    container_name: realworld-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: realworld
      DB_PASSWORD: realworld
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./angular-realworld-example-app
    container_name: realworld-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
